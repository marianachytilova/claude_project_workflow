<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude Project Workflow</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
        }
        header {
            background: #333;
            color: #fff;
            padding: 10px 20px;
            text-align: center;
        }
        main {
            padding: 20px;
        }
        footer {
            background: #333;
            color: #fff;
            text-align: center;
            padding: 10px;
            position: absolute;
            bottom: 0;
            width: 100%;
        }
        .button {
            background-color: #4CAF50; /* Green */
            border: none;
            color: white;
            padding: 15px 32px;
            text-align: center;
            text-decoration: none;
            display: inline-block;
            font-size: 16px;
            margin: 4px 2px;
            transition-duration: 0.4s;
            cursor: pointer;
        }
        .button:hover {
            background-color: white;
            color: black;
            border: 2px solid #4CAF50;
        }
    </style>
</head>
<body>
    <header>
        <h1>Claude Project Workflow</h1>
    </header>
    <main>
        <h2>Welcome to the Claude Project Workflow</h2>
        <p>This is a demonstration of the Claude workflow including stylish design and functionality.</p>
        <button class="button" onclick="handleClick()">Click Me!</button>
    </main>
    <footer>
        <p>&copy; 2026 Claude Project</p>
    </footer>
    <script>
        function handleClick() {
            alert('Button clicked! Workflow is active.');
        }
    </script>
</body>
</html>
