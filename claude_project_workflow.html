
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: var(--font-sans); }
.wrap { padding: 1.5rem 0; }
.header { margin-bottom: 1.5rem; }
.header h2 { font-size: 16px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 4px; }
.header p { font-size: 13px; color: var(--color-text-secondary); }
.steps-row { display: flex; align-items: flex-start; gap: 0; margin-bottom: 1.5rem; overflow-x: auto; padding-bottom: 4px; }
.step-pill { display: flex; flex-direction: column; align-items: center; cursor: pointer; flex: 1; min-width: 88px; position: relative; }
.step-pill:not(:last-child)::after { content: ''; position: absolute; top: 18px; left: 56%; width: 88%; height: 1.5px; background: var(--color-border-tertiary); z-index: 0; }
.step-pill.active:not(:last-child)::after { background: var(--color-border-secondary); }
.step-dot { width: 36px; height: 36px; border-radius: 50%; border: 1.5px solid var(--color-border-secondary); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; color: var(--color-text-secondary); background: var(--color-background-primary); position: relative; z-index: 1; transition: all .18s; flex-shrink: 0; }
.step-pill.active .step-dot { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
.step-pill.done .step-dot { background: var(--color-background-success); border-color: var(--color-border-success); color: var(--color-text-success); }
.step-label { font-size: 11px; color: var(--color-text-tertiary); margin-top: 6px; text-align: center; line-height: 1.3; max-width: 80px; }
.step-pill.active .step-label { color: var(--color-text-info); font-weight: 500; }
.step-pill.done .step-label { color: var(--color-text-success); }
.card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem 1.5rem; }
.card-head { display: flex; align-items: flex-start; gap: 12px; margin-bottom: 1rem; }
.step-num { width: 32px; height: 32px; border-radius: 50%; background: var(--color-background-info); color: var(--color-text-info); display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.card-head-text h3 { font-size: 15px; font-weight: 500; color: var(--color-text-primary); margin-bottom: 3px; }
.card-head-text p { font-size: 13px; color: var(--color-text-secondary); }
.checklist { list-style: none; display: flex; flex-direction: column; gap: 6px; }
.checklist li { display: flex; align-items: flex-start; gap: 10px; font-size: 13px; color: var(--color-text-secondary); cursor: pointer; padding: 5px 8px; border-radius: var(--border-radius-md); transition: background .12s; }
.checklist li:hover { background: var(--color-background-secondary); }
.checklist li.checked { color: var(--color-text-tertiary); }
.check-box { width: 16px; height: 16px; border: 1.5px solid var(--color-border-secondary); border-radius: 4px; flex-shrink: 0; margin-top: 1px; display: flex; align-items: center; justify-content: center; transition: all .12s; }
.checklist li.checked .check-box { background: var(--color-background-success); border-color: var(--color-border-success); }
.check-tick { display: none; width: 10px; height: 10px; }
.checklist li.checked .check-tick { display: block; }
.check-tick::before { content: '✓'; font-size: 10px; color: var(--color-text-success); line-height: 1; }
.checklist li.checked span:last-child { text-decoration: line-through; }
.section-label { font-size: 11px; font-weight: 500; color: var(--color-text-tertiary); text-transform: uppercase; letter-spacing: .06em; margin: 1rem 0 6px; }
.prompt-box { background: var(--color-background-secondary); border-radius: var(--border-radius-md); padding: 10px 14px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; font-family: var(--font-mono); border: 0.5px solid var(--color-border-tertiary); white-space: pre-wrap; }
.nav-row { display: flex; justify-content: space-between; align-items: center; margin-top: 1.25rem; }
.btn { font-size: 13px; padding: 7px 16px; border-radius: var(--border-radius-md); border: 0.5px solid var(--color-border-secondary); background: transparent; color: var(--color-text-primary); cursor: pointer; transition: background .12s; }
.btn:hover { background: var(--color-background-secondary); }
.btn:disabled { opacity: .4; cursor: default; }
.btn.primary { background: var(--color-background-info); border-color: var(--color-border-info); color: var(--color-text-info); }
.btn.primary:hover { opacity: .85; }
.progress-bar { height: 3px; background: var(--color-border-tertiary); border-radius: 2px; margin-bottom: 1.5rem; }
.progress-fill { height: 100%; background: var(--color-background-info); border-radius: 2px; transition: width .25s; }
.table-sm { width: 100%; border-collapse: collapse; font-size: 12px; }
.table-sm th { font-weight: 500; color: var(--color-text-secondary); text-align: left; padding: 5px 8px; border-bottom: 0.5px solid var(--color-border-tertiary); }
.table-sm td { padding: 5px 8px; color: var(--color-text-secondary); border-bottom: 0.5px solid var(--color-border-tertiary); }
.table-sm tr:last-child td { border-bottom: none; }
.badge { display: inline-flex; font-size: 11px; padding: 2px 8px; border-radius: 20px; font-weight: 500; }
.badge.opus { background: var(--color-background-warning); color: var(--color-text-warning); }
.badge.sonnet { background: var(--color-background-info); color: var(--color-text-info); }
.tip { background: var(--color-background-secondary); border-left: 2.5px solid var(--color-border-info); border-radius: 0 var(--border-radius-md) var(--border-radius-md) 0; padding: 8px 12px; font-size: 12px; color: var(--color-text-secondary); line-height: 1.6; margin-top: 1rem; }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
@media (max-width: 520px) { .two-col { grid-template-columns: 1fr; } .steps-row { gap: 0; } }
</style>

<div class="wrap">
  <div class="header">
    <h2>Jak nastavit nový projekt v Claudovi</h2>
    <p>Obecný postup — kliknutím na krok nebo šipkami procházíš workflow</p>
  </div>

  <div class="progress-bar"><div class="progress-fill" id="prog" style="width:16.6%"></div></div>

  <div class="steps-row" id="steps-row">
    <div class="step-pill active" onclick="go(0)">
      <div class="step-dot">1</div>
      <div class="step-label">Přípravné otázky</div>
    </div>
    <div class="step-pill" onclick="go(1)">
      <div class="step-dot">2</div>
      <div class="step-label">Systémová instrukce</div>
    </div>
    <div class="step-pill" onclick="go(2)">
      <div class="step-dot">3</div>
      <div class="step-label">Metodický dokument</div>
    </div>
    <div class="step-pill" onclick="go(3)">
      <div class="step-dot">4</div>
      <div class="step-label">Sestavení projektu</div>
    </div>
    <div class="step-pill" onclick="go(4)">
      <div class="step-dot">5</div>
      <div class="step-label">Notion zázemí</div>
    </div>
    <div class="step-pill" onclick="go(5)">
      <div class="step-dot">6</div>
      <div class="step-label">První chat</div>
    </div>
  </div>

  <div class="card" id="card-content"></div>

  <div class="nav-row">
    <button class="btn" id="btn-prev" onclick="prev()">← Zpět</button>
    <span style="font-size:12px;color:var(--color-text-tertiary)" id="step-counter">1 / 6</span>
    <button class="btn primary" id="btn-next" onclick="next()">Další →</button>
  </div>
</div>

<script>
const steps = [
  {
    title: "Přípravné otázky",
    sub: "Před Claudem — kontext musí přijít od tebe",
    sections: [
      { label: "O sobě jako výzkumnici", items: [
        "Jaká je tvoje role a odborná oblast?",
        "S jakými typy dat nejčastěji pracuješ?",
        "Jaké metody aktivně používáš?",
        "Jaký je tvůj největší bottleneck?"
      ]},
      { label: "O projektu", items: [
        "Co konkrétně zkoumáš? (téma, klient, kontext)",
        "Jaký je hlavní výstup projektu?",
        "Jak citlivá jsou data? (osobní údaje, interní info)",
        "V jakém jazyce budou výstupy?"
      ]},
      { label: "O nástrojích", items: [
        "Jaké nástroje budeš v projektu používat?",
        "Kde se bude archivovat finální výstup?",
        "Kde povedeš AI-use log?"
      ]}
    ],
    tip: "Tyhle odpovědi jsou vstupem pro systémovou instrukci. AI nezná tvůj kontext — musíš ho dodat ty."
  },
  {
    title: "Vygeneruj systémovou instrukci",
    sub: "Prompt pro Claude — ještě před vytvořením projektu",
    prompt: `Pomoz mi vytvořit systémovou instrukci pro Claude Project.

Zde jsou moje odpovědi na přípravné otázky:
[VLOŽ ODPOVĚDI Z KROKU 1]

Instrukce musí obsahovat:
1. Roli a kontext
2. Popis projektu (téma, data, cíl výstupu)
3. Metodické zásady (kompletnost, žádné domýšlení,
   přesné četnosti, rozpory, postup analýzy)
4. Formát pracovních výstupů
5. Co Claude nesmí
6. Jak spolu pracujeme

Formátuj jako hotový text k vložení do sekce Instructions.`,
    items: [
      "Vygenerovat instrukci výše uvedeným promptem",
      "Projít instrukci a opravit nepřesnosti",
      "Doplnit části, které AI nezná (specifika klienta, atd.)",
      "Uložit jako zálohu mimo Claude"
    ],
    tip: "Systémová instrukce je hodnotnější než jednotlivé prompty — nastavuje pravidla pro celý projekt jednou provždy."
  },
  {
    title: "Připrav metodický dokument",
    sub: "Soubor .md s tvou odbornou metodikou jako referenční základ",
    sections: [
      { label: "Co dokument musí obsahovat", items: [
        "Kdo jsi jako výzkumnice (role, metody, typy dat)",
        "Metodické zásady platné pro všechny projekty",
        "Codebook — tematické domény s definicemi",
        "Pravidla kódování (segment, max. kódy, citáty)",
        "Specializovaná terminologie oboru",
        "Pokyny pro AI (Opus vs. Sonnet, připravené prompty)",
        "Log aktualizací (datum / co / proč / verze)"
      ]}
    ],
    tip: "Metodický dokument aktualizuj po každém projektu. Po půl roce práce bude přesnější než cokoliv vygenerovaného jednorázově."
  },
  {
    title: "Sestav projekt v Claude",
    sub: "claude.ai → Projects → New Project",
    table: {
      head: ["Pořadí", "Soubor", "Formát"],
      rows: [
        ["1", "Metodický dokument", ".md"],
        ["2", "Kontext projektu / brief", ".md nebo .pdf"],
        ["3", "Organizační podklady", ".pdf, .docx"],
        ["4", "Existující výzkumy", ".md nebo .pdf"],
        ["5+", "Přepisy, data (průběžně)", ".md, .xlsx"]
      ]
    },
    items: [
      "Vytvořit projekt v Claude (Projects → New Project)",
      "Nahrát soubory v doporučeném pořadí (sekce Files)",
      "Vložit systémovou instrukci (sekce Instructions)",
      "Přepisy vždy jako .md — nikdy .docx nebo .pdf"
    ],
    tip: "Instrukci aktualizuj po každé větší fázi projektu — přidej klíčová zjištění jako kontext pro další chaty."
  },
  {
    title: "Notion zázemí",
    sub: "AI-use log + archiv výstupů",
    sections: [
      { label: "AI-use log — minimální pole", items: [
        "Popis úkolu (co jsi dělala)",
        "Datum + nástroj (Claude Opus / Sonnet / NotebookLM...)",
        "Fáze výzkumu (kódování / analýza / křížová analýza...)",
        "Anonymizace (Ano / Částečně / Není potřeba / Chybí)",
        "Prompt — shrnutí (stručný popis zadání)",
        "Lidská revize (co jsi ve výstupu upravila)",
        "Kvalita výstupu (výborný / dobrý / průměrný / nevhodný)"
      ]},
      { label: "Struktura Notion stránky pro projekt", items: [
        "Research brief",
        "Codebook — aktuální verze",
        "Anonymizační protokol",
        "Log přepisů (kdo / datum / délka / stav anonymizace)",
        "Analytické výstupy (linky nebo .md kopie)",
        "Retrospektiva — co fungovalo, co ne"
      ]}
    ],
    tip: "Bez logu nemůžeš transparentně popsat svůj výzkumný postup ani zjistit, kde AI funguje a kde selhává."
  },
  {
    title: "Ověřovací první chat",
    sub: "Ověř, že projekt funguje — ještě před reálnými daty",
    prompt: `Shrň, co víš o tomto projektu a jaká pravidla platí pro naši spolupráci. Uveď:
- Téma a cíl projektu
- Typy dat, se kterými budeme pracovat
- Tři nejdůležitější metodické zásady
- Formát pracovních výstupů`,
    modelTable: true,
    items: [
      "Poslat ověřovací prompt jako první zprávu v projektu",
      "Zkontrolovat: správný projekt a klient?",
      "Zkontrolovat: metodické zásady jsou přesné, ne obecné?",
      "Zkontrolovat: formát výstupů odpovídá zadání?",
      "Pokud něco chybí → opravit instrukci a opakovat"
    ],
    tip: "Pokud výstup je příliš obecný nebo nepřesný, instrukce potřebuje upřesnění. Lepší to odhalit teď než uprostřed analýzy."
  }
];

let current = 0;
const checked = steps.map(s => ({}));

function renderCard() {
  const s = steps[current];
  let html = `<div class="card-head"><div class="step-num">${current+1}</div><div class="card-head-text"><h3>${s.title}</h3><p>${s.sub}</p></div></div>`;

  if (s.prompt) {
    html += `<div class="section-label">Prompt</div><div class="prompt-box">${s.prompt}</div>`;
  }
  if (s.table) {
    html += `<div class="section-label">Soubory k nahrání — v tomto pořadí</div><table class="table-sm"><thead><tr>${s.table.head.map(h=>`<th>${h}</th>`).join('')}</tr></thead><tbody>${s.table.rows.map(r=>`<tr>${r.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody></table>`;
  }
  if (s.modelTable) {
    html += `<div class="section-label">Výběr modelu — rychlá reference</div><table class="table-sm"><thead><tr><th>Úkol</th><th>Model</th></tr></thead><tbody>
    <tr><td>Individuální analýza přepisu</td><td><span class="badge sonnet">Sonnet</span></td></tr>
    <tr><td>Křížová analýza 5+ rozhovorů</td><td><span class="badge opus">Opus</span></td></tr>
    <tr><td>Tvorba nebo revize codebooku</td><td><span class="badge opus">Opus</span></td></tr>
    <tr><td>Aplikace hotového codebooku</td><td><span class="badge sonnet">Sonnet</span></td></tr>
    <tr><td>Tvorba screeneru / interview guide</td><td><span class="badge sonnet">Sonnet</span></td></tr>
    <tr><td>Kritická revize briefu</td><td><span class="badge opus">Opus</span></td></tr>
    <tr><td>Překlad nebo korektura</td><td><span class="badge sonnet">Sonnet</span></td></tr>
    </tbody></table>`;
  }

  if (s.sections) {
    s.sections.forEach((sec, si) => {
      html += `<div class="section-label">${sec.label}</div><ul class="checklist">`;
      sec.items.forEach((item, ii) => {
        const key = `${si}-${ii}`;
        const done = checked[current][key];
        html += `<li class="${done?'checked':''}" onclick="toggle(${si},${ii})"><div class="check-box"><div class="check-tick"></div></div><span>${item}</span></li>`;
      });
      html += `</ul>`;
    });
  }
  if (s.items) {
    html += `<div class="section-label">Checklist</div><ul class="checklist">`;
    s.items.forEach((item, ii) => {
      const key = `s-${ii}`;
      const done = checked[current][key];
      html += `<li class="${done?'checked':''}" onclick="toggleS(${ii})"><div class="check-box"><div class="check-tick"></div></div><span>${item}</span></li>`;
    });
    html += `</ul>`;
  }

  if (s.tip) {
    html += `<div class="tip">${s.tip}</div>`;
  }

  document.getElementById('card-content').innerHTML = html;
  document.getElementById('step-counter').textContent = `${current+1} / ${steps.length}`;
  document.getElementById('btn-prev').disabled = current === 0;
  document.getElementById('btn-next').textContent = current === steps.length-1 ? 'Hotovo ✓' : 'Další →';
  document.getElementById('prog').style.width = `${((current+1)/steps.length)*100}%`;

  document.querySelectorAll('.step-pill').forEach((el, i) => {
    el.classList.remove('active','done');
    if (i === current) el.classList.add('active');
    else if (i < current) el.classList.add('done');
  });
}

function toggle(si, ii) {
  const key = `${si}-${ii}`;
  checked[current][key] = !checked[current][key];
  renderCard();
}
function toggleS(ii) {
  const key = `s-${ii}`;
  checked[current][key] = !checked[current][key];
  renderCard();
}
function go(i) { current = i; renderCard(); }
function next() { if (current < steps.length-1) { current++; renderCard(); } }
function prev() { if (current > 0) { current--; renderCard(); } }

renderCard();
</script>
